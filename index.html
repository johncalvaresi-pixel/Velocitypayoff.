<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velocity Strategy Engine</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f7f6; padding: 15px; color: #333; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .debt-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr 30px; gap: 5px; margin-bottom: 10px; }
        input { padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; width: 100%; box-sizing: border-box; }
        .results-box { background: #1e3a8a; color: white; padding: 20px; text-align: center; border-radius: 8px; }
        .metric { font-size: 2rem; font-weight: bold; color: #34d399; }
        .btn-row { display: flex; justify-content: space-between; gap: 10px; margin-top: 15px; }
        button { cursor: pointer; padding: 10px; border-radius: 6px; border: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Debt & Velocity Transfers</h2>
        <div id="debtList">
            <div class="debt-row" style="font-size:0.7rem; font-weight:bold;">
                <span>Name</span><span>Balance $</span><span>APR %</span><span>Move to LOC $</span>
            </div>
            <div class="debt-row">
                <input type="text" class="name" placeholder="Citi">
                <input type="number" class="bal" placeholder="Bal">
                <input type="number" class="apr" placeholder="APR">
                <input type="number" class="move" placeholder="Amount">
                <button onclick="this.parentElement.remove()">X</button>
            </div>
        </div>
        <button onclick="addDebtRow()" style="background:#3b82f6; color:white; width:100%; margin-top:10px;">+ Add Debt</button>
    </div>

    <div class="card">
        <label>PLOC/HELOC Interest Rate (%):</label>
        <input type="number" id="locRate" value="10">
    </div>

    <div class="card results-box">
        <h3>Estimated Monthly Savings</h3>
        <div class="metric">$<span id="saved">0</span></div>
    </div>

    <div class="card">
        <h2>Payday Actions</h2>
        <button onclick="logPayday()" style="background:#1e3a8a; color:white; width: 100%;">Log My Payday Progress</button>
        <p id="lastUpdate" style="font-size: 0.8rem; color: #666; margin-top: 10px; text-align: center;"></p>
    </div>

    <div class="btn-row">
        <button onclick="saveData()" style="background:#10b981; color:white; flex:1;">Save Blueprint</button>
        <button onclick="clearData()" style="background:#ef4444; color:white; flex:1;">Clear All</button>
    </div>

    <script>
        function addDebtRow(name="", bal="", apr="", move="") {
            const div = document.createElement('div');
            div.className = 'debt-row';
            div.innerHTML = `<input type="text" class="name" value="${name}"><input type="number" class="bal" value="${bal}"><input type="number" class="apr" value="${apr}"><input type="number" class="move" value="${move}"><button onclick="this.parentElement.remove()">X</button>`;
            document.getElementById('debtList').appendChild(div);
        }

        function calculate() {
            let totalSaved = 0;
            const locRate = parseFloat(document.getElementById('locRate').value) / 100 || 0;
            
            document.querySelectorAll('.debt-row:not(:first-child)').forEach(row => {
                const bal = parseFloat(row.querySelector('.bal').value) || 0;
                const apr = parseFloat(row.querySelector('.apr').value) / 100 || 0;
                const move = parseFloat(row.querySelector('.move').value) || 0;
                
                if (move > 0 && move <= bal) {
                    totalSaved += ((move * apr) / 12) - ((move * locRate) / 12);
                }
            });
            document.getElementById('saved').innerText = totalSaved.toFixed(2);
        }

        function saveData() {
            const debts = [];
            document.querySelectorAll('.debt-row:not(:first-child)').forEach(row => {
                debts.push({
                    name: row.querySelector('.name').value,
                    bal: row.querySelector('.bal').value,
                    apr: row.querySelector('.apr').value,
                    move: row.querySelector('.move').value
                });
            });
            localStorage.setItem('velocityData', JSON.stringify({ debts, locRate: document.getElementById('locRate').value }));
            document.getElementById('lastUpdate').innerText = "Last Saved: " + new Date().toLocaleDateString();
            alert('Blueprint Saved!');
        }

        function logPayday() {
            const history = JSON.parse(localStorage.getItem('paydayHistory') || '[]');
            history.push({ date: new Date().toLocaleDateString(), savings: document.getElementById('saved').innerText });
            localStorage.setItem('paydayHistory', JSON.stringify(history));
            alert('Payday logged! Your strategy is locked in.');
        }

        function clearData() {
            localStorage.clear();
            location.reload();
        }

        function loadData() {
            const saved = JSON.parse(localStorage.getItem('velocityData'));
            if(saved) {
                document.getElementById('locRate').value = saved.locRate;
                saved.debts.forEach(d => addDebtRow(d.name, d.bal, d.apr, d.move));
                calculate();
            }
        }

        document.addEventListener('input', calculate);
        window.onload = loadData;
    </script>
</body>
</html>
