<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Velocity Debt Calculator</title>
    <style>
        body { font-family: sans-serif; background: #f9fafb; padding: 20px; color: #1f2937; max-width: 900px; margin: auto; }
        .calculator-card { background: white; border-radius: 16px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .header-row, .debt-row { display: grid; grid-template-columns: 2fr 1.5fr 1fr 1.5fr 1.5fr 50px; gap: 10px; margin-bottom: 10px; }
        input { padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; width: 100%; box-sizing: border-box; }
        button { cursor: pointer; padding: 10px; border: none; border-radius: 6px; }
    </style>
</head>
<body>

    <div class="calculator-card">
        <h1>Velocity Debt Calculator</h1>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
            <div><label>Net Pay</label><input type="text" id="netPay" onblur="calculate()"></div>
            <div><label>Expenses</label><input type="text" id="expenses" onblur="calculate()"></div>
        </div>

        <div class="header-row">
            <div>Name</div><div>Bal</div><div>APR%</div><div>Min</div><div>Extra</div><div></div>
        </div>
        <div id="debtList"></div>
        <button onclick="addDebtRow()" style="background:#2563eb; color:white; width:100%;">+ Add Debt</button>
    </div>

    <div style="background:#0f172a; color:white; padding:20px; text-align:center; margin-top:20px; border-radius:12px;">
        <h2>Months Remaining</h2>
        <div id="months" style="font-size:3rem; font-weight:bold; color:#22c55e;">0</div>
    </div>

    <script>
        function addDebtRow(n="", b="", a="", m="", v="") {
            const div = document.createElement('div');
            div.className = 'debt-row';
            // Added onblur="calculate()" instead of oninput to prevent typing lock
            div.innerHTML = `<input type="text" value="${n}" onblur="calculate()">
                             <input type="text" value="${b}" onblur="calculate()">
                             <input type="text" value="${a}" onblur="calculate()">
                             <input type="text" value="${m}" onblur="calculate()">
                             <input type="text" value="${v}" onblur="calculate()">
                             <button onclick="this.parentElement.remove(); calculate()">🗑️</button>`;
            document.getElementById('debtList').appendChild(div);
        }

        function calculate() {
            let totalMonths = 0;
            document.querySelectorAll('.debt-row').forEach(row => {
                const i = row.querySelectorAll('input');
                const bal = parseFloat(i[1].value) || 0;
                const apr = (parseFloat(i[2].value) || 0) / 100 / 12;
                const pmt = (parseFloat(i[3].value) || 0) + (parseFloat(i[4].value) || 0);
                
                if (apr > 0 && pmt > (bal * apr)) {
                    totalMonths = Math.max(totalMonths, -Math.log(1 - (bal * apr) / pmt) / Math.log(1 + apr));
                } else if (pmt > 0) {
                    totalMonths = Math.max(totalMonths, bal / pmt);
                }
            });
            document.getElementById('months').innerText = (totalMonths >= 999 || !isFinite(totalMonths)) ? "∞" : Math.ceil(totalMonths);
            
            // Auto-save data
            const data = {
                net: document.getElementById('netPay').value,
                exp: document.getElementById('expenses').value,
                debts: Array.from(document.querySelectorAll('.debt-row')).map(r => {
                    const i = r.querySelectorAll('input');
                    return {n:i[0].value, b:i[1].value, a:i[2].value, m:i[3].value, v:i[4].value};
                })
            };
            localStorage.setItem('velocityData', JSON.stringify(data));
        }

        window.onload = () => {
            const saved = JSON.parse(localStorage.getItem('velocityData'));
            if (saved) {
                document.getElementById('netPay').value = saved.net;
                document.getElementById('expenses').value = saved.exp;
                saved.debts.forEach(d => addDebtRow(d.n, d.b, d.a, d.m, d.v));
            } else { addDebtRow(); }
        };
    </script>
</body>
</html>
