<script>
    function calculate() {
        const freq = parseFloat(document.getElementById('freq').value);
        const netPay = parseFloat(document.getElementById('netPay').value) * freq;
        const expenses = parseFloat(document.getElementById('expenses').value) * freq;
        
        let totalDebt = 0;
        let totalMinPmts = 0;
        let totalMove = 0;

        // Loop through all debt rows to aggregate the totals
        document.querySelectorAll('.debt-row').forEach(row => {
            totalDebt += parseFloat(row.querySelector('.bal')?.value) || 0;
            totalMinPmts += parseFloat(row.querySelector('.minPmt')?.value) || 0;
            totalMove += parseFloat(row.querySelector('.move')?.value) || 0;
        });

        // The True Surplus: (Net Pay - Living Expenses) - Debt Minimums
        const trueSurplus = netPay - expenses - totalMinPmts;
        
        // Update the UI
        document.getElementById('trueSurplus').innerText = "$" + trueSurplus.toLocaleString();
        document.getElementById('months').innerText = totalMove > 0 ? Math.ceil(totalDebt / totalMove) : "0";
    }
</script>
