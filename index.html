<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velocity Debt Payoff Calculator</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 15px; margin: 0; color: #333; }
        .container { max-width: 1000px; margin: auto; }
        .ad-banner { background: #e5e7eb; height: 90px; display: flex; align-items: center; justify-content: center; margin: 20px 0; border: 1px dashed #9ca3af; color: #666; font-size: 0.8rem; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        /* Desktop Layout Grid - Explicit sizing to stop compression */
        .header-row, .row { display: grid; grid-template-columns: 2fr 1.5fr 1fr 1.5fr 1.5fr 50px; gap: 10px; align-items: center; margin-bottom: 10px; }
        input { padding: 12px; border: 1px solid #ccc; border-radius: 6px; width: 100%; box-sizing: border-box; font-size: 1rem; }
        
        button.calc-btn { background: #059669; color: white; padding: 15px; width: 100%; border: none; border-radius: 8px; font-size: 1.2rem; cursor: pointer; margin-top: 20px; font-weight: bold; }
        button.calc-btn:hover { background: #047857; }
        
        /* Mobile Breakpoint to prevent layout squeezing */
        @media (max-width: 600px) {
            .header-row { display: none; }
            .row { grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; }
            .row input:nth-child(1) { grid-column: span 2; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="ad-banner">AdSense 728x90 Top Banner</div>

    <div class="card">
        <h1>Velocity Debt Calculator</h1>
        <div style="display: flex; gap: 20px; margin-bottom: 20px;">
            <div style="flex:1;"><label style="display:block; margin-bottom:5px; font-weight:bold;">Net Pay ($)</label><input type="text" id="netPay"></div>
            <div style="flex:1;"><label style="display:block; margin-bottom:5px; font-weight:bold;">Expenses ($)</label><input type="text" id="expenses"></div>
        </div>

        <div class="header-row" style="font-weight:bold; font-size:0.75rem; color:#64748b;">
            <div>NAME</div><div>BALANCE</div><div>APR%</div><div>MIN PMT</div><div>EXTRA PMT</div><div></div>
        </div>
        
        <div id="debtList"></div>
        
        <button onclick="addDebtRow()" style="background:#3b82f6; color:white; padding:12px; border:none; border-radius:6px; width:100%; margin-top:10px; font-weight:bold; cursor:pointer;">+ Add Debt</button>
        <button class="calc-btn" onclick="calculate()">CALCULATE PAYOFF DATE</button>
    </div>

    <div class="card" style="text-align:center; background:#1e3a8a; color:white;">
        <h2 style="margin:0; font-size:1.2rem; opacity:0.9;">Estimated Time to Debt-Free</h2>
        <div id="months" style="font-size: 4rem; font-weight: 800; color: #34d399; margin: 10px 0;">0</div>
        <div style="font-size:1.1rem; opacity:0.9;">months remaining</div>
    </div>

    <div class="ad-banner">AdSense Responsive Display Bottom</div>
</div>

<script>
    function addDebtRow(n="", b="", a="", m="", v="") {
        const div = document.createElement('div');
        div.className = 'row';
        div.innerHTML = `<input type="text" class="dName" value="${n}" placeholder="Debt Name">
                         <input type="text" class="dBal" value="${b}" placeholder="Balance ($)">
                         <input type="text" class="dApr" value="${a}" placeholder="APR (%)">
                         <input type="text" class="dMin" value="${m}" placeholder="Min Pmt ($)">
                         <input type="text" class="dExt" value="${v}" placeholder="Extra Pmt ($)">
                         <button onclick="this.parentElement.remove()" style="background:#ef4444; color:white; border:none; padding:10px; border-radius:6px; cursor:pointer; font-weight:bold;">X</button>`;
        document.getElementById('debtList').appendChild(div);
    }

    function calculate() {
        let maxMonths = 0;
        const rows = document.getElementsByClassName('row');
        
        for (let row of rows) {
            const bal = parseFloat(row.querySelector('.dBal').value) || 0;
            const apr = (parseFloat(row.querySelector('.dApr').value) || 0) / 100 / 12;
            const min = parseFloat(row.querySelector('.dMin').value) || 0;
            const ext = parseFloat(row.querySelector('.dExt').value) || 0;
            const pmt = min + ext;
            
            // Fixed loop checker to ignore blanks and calculate properly
            if (bal > 0 && pmt > 0) {
                let currentDebtMonths = 0;
                
                if (apr > 0) {
                    if (pmt > (bal * apr)) {
                        currentDebtMonths = -Math.log(1 - (bal * apr) / pmt) / Math.log(1 + apr);
                    } else {
                        currentDebtMonths = Infinity;
                    }
                } else {
                    currentDebtMonths = bal / pmt;
                }
                
                if (currentDebtMonths > maxMonths) {
                    maxMonths = currentDebtMonths;
                }
            }
        }
        
        const displayBox = document.getElementById('months');
        if (maxMonths === Infinity) {
            displayBox.innerText = "∞";
        } else if (maxMonths === 0) {
            displayBox.innerText = "0";
        } else {
            displayBox.innerText = Math.ceil(maxMonths);
        }
        
        // Auto-save state
        const data = {
            net: document.getElementById('netPay').value,
            exp: document.getElementById('expenses').value,
            debts: Array.from(rows).map(r => ({
                n: r.querySelector('.dName').value,
                b: r.querySelector('.dBal').value,
                a: r.querySelector('.dApr').value,
                m: r.querySelector('.dMin').value,
                v: r.querySelector('.dExt').value
            }))
        };
        localStorage.setItem('velocityData', JSON.stringify(data));
    }

    window.onload = () => {
        const saved = JSON.parse(localStorage.getItem('velocityData'));
        if (saved && saved.debts && saved.debts.length > 0) {
            document.getElementById('netPay').value = saved.net || "";
            document.getElementById('expenses').value = saved.exp || "";
            saved.debts.forEach(d => addDebtRow(d.n, d.b, d.a, d.m, d.v));
        } else { 
            addDebtRow(); 
        }
    };
</script>
</body>
</html>
