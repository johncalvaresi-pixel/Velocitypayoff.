<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velocity Strategy Engine</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f7f6; padding: 15px; color: #333; max-width: 800px; margin: auto; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .header-row, .debt-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr 1fr 30px; gap: 5px; margin-bottom: 10px; }
        .label { font-size: 0.75rem; font-weight: bold; color: #64748b; }
        input { padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; width: 100%; box-sizing: border-box; }
        .results-box { background: #1e3a8a; color: white; padding: 20px; text-align: center; border-radius: 8px; }
        .metric { font-size: 2.5rem; font-weight: bold; color: #34d399; }
        .btn-row { display: flex; justify-content: space-between; gap: 10px; margin-top: 15px; }
        button { cursor: pointer; padding: 10px; border-radius: 6px; border: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h2>My Financial Pulse</h2>
        <label>Net Pay ($):</label>
        <input type="number" id="netPay" value="2000" oninput="calculate()">
        <label style="margin-top:10px; display:block;">Expenses ($):</label>
        <input type="number" id="expenses" value="1250" oninput="calculate()">
        
        <div style="margin-top: 15px; padding: 10px; background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 6px;">
            <strong>Surplus:</strong>
            <div id="trueSurplus" style="font-size: 1.5rem; color: #059669;">$0</div>
        </div>
    </div>

    <div class="card">
        <h2>Debt & Velocity Transfers</h2>
        <div class="header-row">
            <div class="label">Name</div>
            <div class="label">Balance</div>
            <div class="label">APR %</div>
            <div class="label">Min Pmt</div>
            <div class="label">Move $</div>
            <div></div>
        </div>
        <div id="debtList"></div>
        <button onclick="addDebtRow()" style="background:#3b82f6; color:white; width:100%; margin-top:10px;">+ Add Debt</button>
    </div>

    <div class="card results-box">
        <h3>Estimated Payoff (Months)</h3>
        <div class="metric" id="months">0</div>
    </div>

    <div class="btn-row">
        <button onclick="saveData()" style="background:#10b981; color:white; flex:1;">Save Blueprint</button>
        <button onclick="clearData()" style="background:#ef4444; color:white; flex:1;">Clear All</button>
    </div>

    <script>
        function addDebtRow(n="", b=0, a=0, m=0, v=0) {
            const div = document.createElement('div');
            div.className = 'debt-row';
            div.innerHTML = `
                <input type="text" class="name" value="${n}">
                <input type="number" class="bal" value="${b}" oninput="calculate()">
                <input type="number" class="apr" value="${a}">
                <input type="number" class="minPmt" value="${m}" oninput="calculate()">
                <input type="number" class="move" value="${v}" oninput="calculate()">
                <button onclick="this.parentElement.remove(); calculate()">X</button>`;
            document.getElementById('debtList').appendChild(div);
            calculate();
        }

        function calculate() {
            const netPay = parseFloat(document.getElementById('netPay').value) || 0;
            const expenses = parseFloat(document.getElementById('expenses').value) || 0;
            let totalBal = 0, totalMin = 0, totalMove = 0;

            document.querySelectorAll('.debt-row').forEach(row => {
                const inputs = row.querySelectorAll('input');
                totalBal += parseFloat(inputs[1].value) || 0;
                totalMin += parseFloat(inputs[3].value) || 0;
                totalMove += parseFloat(inputs[4].value) || 0;
            });

            document.getElementById('trueSurplus').innerText = "$" + (netPay - expenses - totalMin).toLocaleString();
            document.getElementById('months').innerText = (totalMove > 0) ? Math.ceil(totalBal / totalMove) : "0";
        }

        function saveData() {
            const data = { 
                netPay: document.getElementById('netPay').value, 
                expenses: document.getElementById('expenses').value, 
                debts: Array.from(document.querySelectorAll('.debt-row')).map(row => {
                    const inputs = row.querySelectorAll('input');
                    return { n: inputs[0].value, b: inputs[1].value, a: inputs[2].value, m: inputs[3].value, v: inputs[4].value };
                })
            };
            localStorage.setItem('velocityBlueprint', JSON.stringify(data));
            alert('Blueprint Saved!');
        }

        function loadData() {
            const saved = JSON.parse(localStorage.getItem('velocityBlueprint'));
            if(saved) {
                document.getElementById('netPay').value = saved.netPay;
                document.getElementById('expenses').value = saved.expenses;
                saved.debts.forEach(d => addDebtRow(d.n, d.b, d.a, d.m, d.v));
            } else { addDebtRow(); }
            calculate();
        }

        window.onload = loadData;
        function clearData() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
