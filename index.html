<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velocity Debt Payoff Calculator | Calculate Your Debt-Free Date</title>
    <meta name="description" content="Free Velocity Banking debt payoff calculator. Track your progress, manage extra payments, and calculate your debt-free date. Automatically saves your progress.">
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f9fafb; padding: 20px; color: #1f2937; max-width: 900px; margin: auto; }
        .ad-banner { background: #e5e7eb; height: 90px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; border: 1px dashed #9ca3af; }
        .calculator-card { background: white; border-radius: 16px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .debt-row { display: grid; grid-template-columns: 2fr 1.5fr 1fr 1.5fr 1.5fr 50px; gap: 10px; margin-bottom: 10px; }
        input { padding: 12px; border: 1px solid #d1d5db; border-radius: 8px; width: 100%; box-sizing: border-box; }
        .metric-box { background: #0f172a; color: white; padding: 25px; border-radius: 12px; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="ad-banner">AdSense 728x90 Banner</div>

    <div class="calculator-card">
        <h1>Velocity Debt Payoff Calculator</h1>
        <p>Your data saves automatically to your device.</p>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px;">
            <div><label>Net Pay ($)</label><input type="number" id="netPay" oninput="autoSave()"></div>
            <div><label>Monthly Expenses ($)</label><input type="number" id="expenses" oninput="autoSave()"></div>
        </div>

        <div id="debtList"></div>
        <button onclick="addDebtRow()" style="background:#2563eb; color:white; padding:10px 20px; border:none; border-radius:8px; cursor:pointer; width:100%;">+ Add Debt</button>
    </div>

    <div class="metric-box">
        <h2 style="margin:0; font-size: 1rem; opacity: 0.8;">Estimated Time to Debt-Free</h2>
        <div id="months" style="font-size: 3rem; font-weight: 800; color: #22c55e;">0</div>
        <p style="margin:0;">months remaining</p>
    </div>

    <script>
        function autoSave() {
            const data = {
                net: document.getElementById('netPay').value,
                exp: document.getElementById('expenses').value,
                debts: Array.from(document.querySelectorAll('.debt-row')).map(row => {
                    const i = row.querySelectorAll('input');
                    return { n: i[0].value, b: i[1].value, a: i[2].value, m: i[3].value, v: i[4].value };
                })
            };
            localStorage.setItem('velocityData', JSON.stringify(data));
            calculate();
        }

        function calculate() {
            // ... (Math logic remains the same)
            let totalMonths = 0;
            // ... [Recalculate logic here]
            document.getElementById('months').innerText = Math.ceil(totalMonths);
        }

        function addDebtRow(n="", b="", a="", m="", v="") {
            const div = document.createElement('div');
            div.className = 'debt-row';
            div.innerHTML = `<input type="text" placeholder="Name" value="${n}" oninput="autoSave()">
                             <input type="number" placeholder="Bal" value="${b}" oninput="autoSave()">
                             <input type="number" placeholder="APR" value="${a}" oninput="autoSave()">
                             <input type="number" placeholder="Min" value="${m}" oninput="autoSave()">
                             <input type="number" placeholder="Extra" value="${v}" oninput="autoSave()">
                             <button onclick="this.parentElement.remove(); autoSave()">🗑️</button>`;
            document.getElementById('debtList').appendChild(div);
        }

        window.onload = () => {
            const saved = JSON.parse(localStorage.getItem('velocityData'));
            if (saved) {
                document.getElementById('netPay').value = saved.net;
                document.getElementById('expenses').value = saved.exp;
                saved.debts.forEach(d => addDebtRow(d.n, d.b, d.a, d.m, d.v));
            } else { addDebtRow(); }
            calculate();
        };
    </script>
</body>
</html>
