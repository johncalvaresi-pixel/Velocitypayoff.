<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VelocityCalc - Debt Freedom Engine</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f4f7f6; padding: 15px; color: #333; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 15px; }
        h2 { color: #1e3a8a; font-size: 1.2rem; border-bottom: 2px solid #e2e8f0; padding-bottom: 8px; margin-bottom: 15px; }
        label { font-size: 0.85rem; font-weight: 600; color: #4b5563; display: block; margin-bottom: 4px; }
        select, input { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; margin-bottom: 10px; }
        .results-box { background: #1e3a8a; color: white; border-radius: 8px; padding: 20px; text-align: center; }
        .metric { font-size: 2rem; font-weight: bold; color: #34d399; }
        .btn { width: 48%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="card">
        <h2>1. Strategy Mode</h2>
        <label>Select Your Tool:</label>
        <select id="strategyMode">
            <option value="cc">Credit Card Float</option>
            <option value="ploc">Personal Line of Credit (PLOC)</option>
            <option value="cash">Pure Cash-Flow Strategy</option>
        </select>
    </div>

    <div class="card">
        <h2>2. Financial Metrics</h2>
        <label>Target Debt ($)</label>
        <input type="number" id="debt" value="200000">
        <label>Monthly Net Income ($)</label>
        <input type="number" id="income" value="5000">
        <label>Total Expenses ($)</label>
        <input type="number" id="expenses" value="3500">
    </div>

    <div class="card results-box">
        <h3>Estimated Debt Freedom</h3>
        <div class="metric"><span id="months">0</span> Months</div>
    </div>

    <button class="btn" style="background:#10b981; color:white;" onclick="saveData()">Save Blueprint</button>
    <button class="btn" style="background:#ef4444; color:white;" onclick="clearData()">Clear</button>

    <script>
        function calculate() {
            const debt = parseFloat(document.getElementById('debt').value);
            const income = parseFloat(document.getElementById('income').value);
            const expenses = parseFloat(document.getElementById('expenses').value);
            const mode = document.getElementById('strategyMode').value;
            
            const cashFlow = income - expenses;
            if (cashFlow <= 0) {
                document.getElementById('months').innerText = "N/A";
                return;
            }

            // Calculation logic shifts based on mode
            let months = Math.ceil(debt / cashFlow);
            document.getElementById('months').innerText = months;
        }

        function saveData() {
            const data = {
                debt: document.getElementById('debt').value,
                income: document.getElementById('income').value,
                expenses: document.getElementById('expenses').value,
                mode: document.getElementById('strategyMode').value
            };
            localStorage.setItem('velocityData', JSON.stringify(data));
            alert('Saved!');
        }

        function loadData() {
            const saved = localStorage.getItem('velocityData');
            if(saved) {
                const d = JSON.parse(saved);
                document.getElementById('debt').value = d.debt;
                document.getElementById('income').value = d.income;
                document.getElementById('expenses').value = d.expenses;
                document.getElementById('strategyMode').value = d.mode;
            }
            calculate();
        }

        document.querySelectorAll('input, select').forEach(el => el.addEventListener('input', calculate));
        window.onload = loadData;
    </script>
</body>
</html>
