<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velocity Debt Payoff Calculator</title>
    <style>
        body { font-family: sans-serif; background: #f9fafb; padding: 20px; color: #1f2937; max-width: 900px; margin: auto; }
        .calculator-card { background: white; border-radius: 16px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .header-row, .debt-row { display: grid; grid-template-columns: 2fr 1.5fr 1fr 1.5fr 1.5fr 50px; gap: 10px; margin-bottom: 10px; }
        .label { font-size: 0.75rem; font-weight: bold; color: #64748b; text-transform: uppercase; }
        input { padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; width: 100%; box-sizing: border-box; }
        .metric-box { background: #0f172a; color: white; padding: 25px; border-radius: 12px; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="calculator-card">
        <h1>Velocity Debt Payoff Calculator</h1>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px;">
            <div><label>Net Pay ($)</label><input type="text" id="netPay" oninput="calculate()"></div>
            <div><label>Expenses ($)</label><input type="text" id="expenses" oninput="calculate()"></div>
        </div>

        <div class="header-row">
            <div class="label">Debt Name</div>
            <div class="label">Balance</div>
            <div class="label">APR %</div>
            <div class="label">Min Pmt</div>
            <div class="label">Extra Pmt</div>
            <div></div>
        </div>
        <div id="debtList"></div>
        <button onclick="addDebtRow()" style="background:#2563eb; color:white; padding:10px; border:none; border-radius:6px; width:100%; cursor:pointer;">+ Add Debt</button>
    </div>

    <div class="metric-box">
        <h2 style="margin:0; font-size: 1rem; opacity: 0.8;">Estimated Time to Debt-Free</h2>
        <div id="months" style="font-size: 3rem; font-weight: 800; color: #22c55e;">0</div>
        <p style="margin:0;">months remaining</p>
    </div>

    <script>
        function calculate() {
            let totalMonths = 0;
            document.querySelectorAll('.debt-row').forEach(row => {
                const i = row.querySelectorAll('input');
                const bal = parseFloat(i[1].value) || 0;
                const apr = (parseFloat(i[2].value) || 0) / 100 / 12;
                const pmt = (parseFloat(i[3].value) || 0) + (parseFloat(i[4].value) || 0);
                
                if (apr > 0 && pmt > (bal * apr)) {
                    const m = -Math.log(1 - (bal * apr) / pmt) / Math.log(1 + apr);
                    totalMonths = Math.max(totalMonths, m);
                } else if (pmt > 0) {
                    totalMonths = Math.max(totalMonths, bal / pmt);
                }
            });
            document.getElementById('months').innerText = (totalMonths >= 999 || !isFinite(totalMonths)) ? "∞" : Math.ceil(totalMonths);
            autoSave();
        }

        function addDebtRow(n="", b="", a="", m="", v="") {
            const div = document.createElement('div');
            div.className = 'debt-row';
            div.innerHTML = `<input type="text" value="${n}" oninput="calculate()">
                             <input type="text" value="${b}" oninput="calculate()">
                             <input type="text" value="${a}" oninput="calculate()">
                             <input type="text" value="${m}" oninput="calculate()">
                             <input type="text" value="${v}" oninput="calculate()">
                             <button onclick="this.parentElement.remove(); calculate()">🗑️</button>`;
            document.getElementById('debtList').appendChild(div);
        }

        function autoSave() {
            const data = {
                net: document.getElementById('netPay').value,
                exp: document.getElementById('expenses').value,
                debts: Array.from(document.querySelectorAll('.debt-row')).map(row => {
                    const i = row.querySelectorAll('input');
                    return { n: i[0].value, b: i[1].value, a: i[2].value, m: i[3].value, v: i[4].value };
                })
            };
            localStorage.setItem('velocityData', JSON.stringify(data));
        }

        window.onload = () => {
            const saved = JSON.parse(localStorage.getItem('velocityData'));
            if (saved) {
                document.getElementById('netPay').value = saved.net;
                document.getElementById('expenses').value = saved.exp;
                saved.debts.forEach(d => addDebtRow(d.n, d.b, d.a, d.m, d.v));
            } else { addDebtRow(); }
            calculate();
        };
    </script>
</body>
</html>
