<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velocity Strategy Engine</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f7f6; padding: 15px; color: #333; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .debt-row { display: grid; grid-template-columns: repeat(5, 1fr) 30px; gap: 5px; margin-bottom: 10px; }
        input, select { padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; width: 100%; }
        .results-box { background: #1e3a8a; color: white; padding: 20px; text-align: center; border-radius: 8px; }
        .metric { font-size: 2rem; font-weight: bold; color: #34d399; }
        button { cursor: pointer; padding: 10px; border-radius: 6px; border: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Financial Pulse</h2>
        <label>Net Pay ($):</label>
        <input type="number" id="netPay" value="2000" oninput="calculate()">
        <label>Expenses ($):</label>
        <input type="number" id="expenses" value="1250" oninput="calculate()">
        <div style="margin-top: 10px;">
            <strong>Surplus:</strong> <span id="trueSurplus" style="font-size: 1.5rem; color: #059669;">$0</span>
        </div>
    </div>

    <div class="card">
        <h2>Debt List</h2>
        <div id="debtList"></div>
        <button onclick="addDebtRow()" style="background:#3b82f6; color:white; width:100%;">+ Add Debt</button>
    </div>

    <div class="card results-box">
        <h3>Estimated Payoff (Months)</h3>
        <div class="metric" id="months">0</div>
    </div>

    <script>
        function addDebtRow(n="", b=0, a=0, m=0, v=0) {
            const div = document.createElement('div');
            div.className = 'debt-row';
            div.innerHTML = `
                <input type="text" placeholder="Name" value="${n}">
                <input type="number" class="bal" placeholder="Bal" value="${b}">
                <input type="number" class="apr" placeholder="APR" value="${a}">
                <input type="number" class="minPmt" placeholder="Min" value="${m}">
                <input type="number" class="move" placeholder="Move" value="${v}">
                <button onclick="this.parentElement.remove(); calculate()">X</button>`;
            
            div.addEventListener('input', calculate);
            document.getElementById('debtList').appendChild(div);
            calculate();
        }

        function calculate() {
            const net = parseFloat(document.getElementById('netPay').value) || 0;
            const exp = parseFloat(document.getElementById('expenses').value) || 0;
            let b = 0, m = 0, v = 0;

            document.querySelectorAll('.debt-row').forEach(row => {
                const inputs = row.querySelectorAll('input');
                b += parseFloat(inputs[1].value) || 0;
                m += parseFloat(inputs[3].value) || 0;
                v += parseFloat(inputs[4].value) || 0;
            });

            document.getElementById('trueSurplus').innerText = "$" + (net - exp - m).toLocaleString();
            document.getElementById('months').innerText = (v > 0) ? Math.ceil(b / v) : "0";
        }

        addDebtRow(); // Initialize one row
    </script>
</body>
</html>
